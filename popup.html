<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>YouTube Dual Subtitles</title>
    <style>
      body {
        min-width: 240px;
        margin: 0;
        padding: 16px;
        color: #202124;
        background: #ffffff;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 18px;
        height: 18px;
      }

      .field {
        margin-top: 14px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
      }

      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        font: inherit;
      }

      p {
        margin: 12px 0 0;
        color: #5f6368;
        font-size: 12px;
        line-height: 1.4;
      }

      #status {
        color: #5f6368;
      }

      #status:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Dual Subtitles</h1>
    <label>
      <input id="enabled" type="checkbox" disabled>
      Enable dual subtitles
    </label>
    <div class="field">
      <label for="source-language">Source language</label>
      <select id="source-language" disabled></select>
    </div>
    <div class="field">
      <label for="target-language">Target language</label>
      <select id="target-language" disabled></select>
    </div>
    <p id="status"></p>
    <p>Open a YouTube video with captions, then choose the source and target languages.</p>
    <p>If translations lag behind fast speech, try slowing YouTube playback slightly.</p>
    <script src="src/languages.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
