<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>YouTube Dual Subtitles</title>
    <style>
      body {
        min-width: 240px;
        margin: 0;
        padding: 16px;
        color: #202124;
        background: #ffffff;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 18px;
        height: 18px;
      }

      .field {
        margin-top: 14px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
      }

      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        font: inherit;
      }

      p {
        margin: 12px 0 0;
        color: #5f6368;
        font-size: 12px;
        line-height: 1.4;
      }

      #status {
        min-height: 17px;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Dual Subtitles</h1>
    <label>
      <input id="enabled" type="checkbox" disabled>
      Enable dual subtitles
    </label>
    <div class="field">
      <label for="translation-delay">Translation delay</label>
      <select id="translation-delay" disabled>
        <option value="100">Fast (100ms)</option>
        <option value="200">Balanced (200ms)</option>
        <option value="350">Smooth (350ms)</option>
      </select>
    </div>
    <p id="status">Loading setting...</p>
    <p>Open a YouTube video with captions, then tune the delay for responsiveness or smoothness.</p>
    <script src="popup.js"></script>
  </body>
</html>
