<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>YouTube Dual Subtitles</title>
    <style>
      body {
        min-width: 240px;
        margin: 0;
        padding: 16px;
        color: #202124;
        background: #ffffff;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 18px;
        height: 18px;
      }

      p {
        margin: 12px 0 0;
        color: #5f6368;
        font-size: 12px;
        line-height: 1.4;
      }

      #status {
        min-height: 17px;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Dual Subtitles</h1>
    <label>
      <input id="enabled" type="checkbox">
      Enable dual subtitles
    </label>
    <p id="status">Loading setting...</p>
    <p>Open a YouTube video with Finnish captions, then toggle this on or off.</p>
    <script src="popup.js"></script>
  </body>
</html>
