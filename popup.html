<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>YouTube Dual Subtitles</title>
    <style>
      body {
        min-width: 240px;
        margin: 0;
        padding: 16px;
        color: #202124;
        background: #ffffff;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      .field {
        margin-top: 14px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
      }

      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        font: inherit;
      }

      .language-search {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 6px;
        padding: 6px;
        font: inherit;
      }

      p {
        margin: 12px 0 0;
        color: #5f6368;
        font-size: 12px;
        line-height: 1.4;
      }

      .support {
        margin-top: 14px;
      }

      .support a {
        align-items: center;
        color: #1a73e8;
        display: inline-flex;
        font-weight: 700;
        gap: 6px;
        text-decoration: none;
      }

      .support a:hover {
        text-decoration: underline;
      }

      .support img {
        height: 18px;
        width: 18px;
      }

      #status {
        color: #5f6368;
      }

      #status:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Dual Subtitles</h1>
    <label>
      <input id="enabled" type="checkbox" disabled>
      Enable dual subtitles
    </label>
    <div class="field">
      <label for="source-language">Source language</label>
      <input id="source-language-search" class="language-search" type="search" placeholder="Search source languages" aria-label="Search source languages" autocomplete="off" disabled>
      <select id="source-language" disabled></select>
    </div>
    <div class="field">
      <label for="target-language">Target language</label>
      <input id="target-language-search" class="language-search" type="search" placeholder="Search target languages" aria-label="Search target languages" autocomplete="off" disabled>
      <select id="target-language" disabled></select>
    </div>
    <div class="field">
      <label for="overlay-position">Position</label>
      <select id="overlay-position" disabled></select>
    </div>
    <p id="status"></p>
    <p>Open a YouTube video with captions, then choose the source and target languages.</p>
    <p>If translations lag behind fast speech, try choosing the source language instead of Auto-detect, or slow YouTube playback slightly.</p>
    <p class="support">
      <a href="https://buymeacoffee.com/bluezebrafish" target="_blank" rel="noopener noreferrer">
        <img src="assets/coffee.svg" alt="" aria-hidden="true">
        Buy me a coffee
      </a>
    </p>
    <script src="src/languages.js"></script>
    <script src="src/overlaySettings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
